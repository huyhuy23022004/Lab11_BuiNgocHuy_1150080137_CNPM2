name: Full Selenium CI Pipeline - Bai 6

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1-5' # 2:00 AM thứ 2 đến thứ 6 (UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
        
      - name: Chạy test (${{ matrix.browser }})
        working-directory: ./bai6
        run: mvn clean test "-Dbrowser=${{ matrix.browser }}" "-DsuiteXmlFile=testng-smoke.xml"
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
          
      - name: Lưu kết quả Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: bai6/target/allure-results/
          retention-days: 1

  publish-report:
    needs: test       
    if: always()      
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download kết quả Chrome
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: allure-results/
        
      - name: Download kết quả Firefox
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results/
        
      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
