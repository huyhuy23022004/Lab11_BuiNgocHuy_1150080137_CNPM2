# ============================================================
# config.properties - Cấu hình môi trường cho framework test
# Đọc bởi ConfigReader.java
# ============================================================

# --- Môi trường mặc định ---
env=dev

# --- Base URL theo môi trường ---
url.dev=https://www.saucedemo.com/
url.staging=https://www.saucedemo.com/
url.prod=https://www.saucedemo.com/

# --- Timeout settings (giây) ---
timeout.explicit=15
timeout.pageload=30

# --- APP CREDENTIALS (SỬ DỤNG KHI CHẠY LOCAL NẾU KHÔNG CẤU HÌNH ENV) ---
# Không được lưu password thật ở đây theo chuẩn bảo mật.
app.username=your_username_here
app.password=your_password_here
